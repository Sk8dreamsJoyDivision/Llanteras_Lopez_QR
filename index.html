<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Información de Pago – Llantera Lopez Libramiento</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
font-family:'Roboto', sans-serif;
background:#ffffff;
color:#222;
text-align:center;
padding:40px 20px;
}

.card{
background:#ffffff;
display:inline-block;
padding:40px 50px;
border-radius:14px;
border:3px solid #0b3d91;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
max-width:420px;
}

h1{
font-family:'Oswald', sans-serif;
color:#0b3d91;
font-size:28px;
margin-bottom:25px;
}

p{
margin:10px 0;
font-size:18px;
}

.label{
font-weight:600;
color:#0b3d91;
}

button{
margin-top:8px;
padding:6px 16px;
border:none;
border-radius:6px;
background:#0b3d91;
color:white;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#072c6d;
}

.copied{
background:#2ecc71 !important;
}

.footer{
margin-top:25px;
font-size:15px;
}

</style>
</head>

<body>

<div class="card">

<h1>Información de Pago
Llantera Lopez Libramiento</h1>

<p>
🏦 <span class="label">Banco:</span> HSBC
</p>

<p>
💳 <span class="label">Num Cuenta:</span><br>
<span id="transfer">xxx xxxx xxxx xxxx</span><br>

<button onclick="copyText('transfer',this)">
Copiar número
</button>
</p>

<p>
📝 <span class="label">Concepto:</span> Tu nombre
</p>

<p class="footer">
Gracias!<br>
<strong>the chunkie lab</strong>
</p>

</div>

<script>

function copyText(id,btn){

const el=document.getElementById(id)

navigator.clipboard.writeText(el.innerText)

const old=btn.innerText

btn.innerText="¡Copiado!"

btn.classList.add("copied")

setTimeout(()=>{
btn.innerText=old
btn.classList.remove("copied")
},1500)

}

</script>

</body>
</html>
